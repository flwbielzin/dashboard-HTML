<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <!-- ======= Estilos ====== -->
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Transições</title>
</head>
<body>
    <!-- ================ Lista de Transações ================= -->
    <div class="details">
        <div class="recentOrders">
            <div class="cardHeader">
                <h2>Transações Recentes</h2>
                <a href="#" class="btn">Adicionar Nova</a>
            </div>

            <table>
                <thead>
                    <tr>
                        <td>Descrição</td>
                        <td>Valor</td>
                        <td>Categoria</td>
                        <td>Tipo</td>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Salário</td>
                        <td></td>
                        <td>Receitas</td>
                        <td><span class="status received">Receita</span></td>
                    </tr>

                    <tr>
                        <td>Mercado</td>
                        <td></td>
                        <td>Alimentação</td>
                        <td><span class="status spent">Despesa</span></td>
                    </tr>

                    <tr>
                        <td>Internet</td>
                        <td></td>
                        <td>Serviços</td>
                        <td><span class="status spent">Despesa</span></td>
                    </tr>
                </tbody>
            </table>

            <!-- ===================== Calculadora de Parcelas =================== -->
          <div class="parcelas">
            <div class="cardHeader">
                <h2>Calcule o Total de Parcelas</h2>
            </div>

            <div class="input-group">
                <label for="valor">Valor da Compra:</label>
                <input type="number" id="valor" placeholder="Digite o valor da compra">

                <label for="parcelas">Número de Parcelas:</label>
                <input type="number" id="parcelas" placeholder="Digite o número de parcelas">

                <button id="calcular" class="btn">Calcular</button>
            </div>

            <div class="resultado">
                <h4>Total da Compra:</h4>
                <span id="totalCompra">R$ 0,00</span>
            </div>
          </div>

        </div>

         

        <script src="dashboard.js"></script>
</body>
</html>
